<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamentos</title>
    <style>
        :root {
            --primary-blue: #007BFF;
            --light-bg: #f8f9fa;
            --border-color: #ddd;
        }
        
        * { 
            box-sizing: border-box; 
            font-family: Arial, sans-serif; 
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }
        
        body { margin: 0; padding: 0; background-color: #e9ecef; display: flex; height: 100vh; }
        
        /* Layout Principal */
        .app-container { display: flex; width: 100%; height: 100%; overflow: hidden; }
        .form-panel { width: 400px; background: white; padding: 20px; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 10; }
        .preview-panel { flex: 1; padding: 20px; overflow-y: auto; display: flex; justify-content: center; background: #525659; }
        
        /* Estilos do Formulário */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .dynamic-list { border: 1px solid #eee; padding: 10px; margin-bottom: 15px; border-radius: 4px; background: var(--light-bg); }
        .list-item { display: flex; gap: 10px; margin-bottom: 10px; }
        .list-item input[type="text"] { flex: 2; }
        .list-item input[type="number"] { flex: 1; }
        button { background: var(--primary-blue); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        button:hover { background: #0056b3; }
        .btn-small { width: auto; padding: 5px 10px; font-size: 12px; margin-bottom: 0; background: #28a745; }
        .btn-remove { background: #dc3545; }

        /* Estilos da Folha A4 (Preview Web) */
        .a4-sheet {
            background: white;
            width: 210mm;
            min-height: 297mm; /* Garante no mínimo uma A4 */
            padding: 15mm;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            margin: auto;
            display: flex;
            flex-direction: column;
        }

        /* Estilos Internos do Documento */
        .doc-header h3 { color: var(--primary-blue); margin: 0 0 5px 0; text-transform: uppercase; font-size: 16px; }
        .doc-header h1 { color: var(--primary-blue); margin: 0 0 5px 0; font-size: 20px; text-transform: uppercase; }
        .doc-header p { color: var(--primary-blue); font-weight: bold; margin: 0; font-size: 12px; }
        
        .section-title { text-align: center; color: var(--primary-blue); text-transform: uppercase; font-size: 14px; margin: 20px 0 10px 0; font-weight: bold; }
        
        table.doc-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-bottom: 15px; 
            table-layout: fixed; /* Força a tabela a respeitar a largura da página */
        }
        
        /* CORREÇÃO DO BUG DE TEXTO INFINITO */
        table.doc-table th, table.doc-table td { 
            border: 1px solid var(--border-color); 
            padding: 10px; 
            text-align: left; 
            font-size: 14px; 
            word-wrap: break-word; /* Quebra palavras muito grandes */
            overflow-wrap: break-word;
            word-break: break-word;
        }
        
        table.doc-table th { color: var(--primary-blue); text-align: center; background: white; border-top: 2px solid var(--primary-blue); }
        table.doc-table tbody tr:nth-child(even) { background-color: #fcfcfc; }
        
        /* Define a largura da coluna de valor para não esmagar o texto */
        table.doc-table th:last-child, table.doc-table td:last-child {
            width: 150px;
        }

        /* Estilos do Rodapé Fixo no Fundo */
        .doc-footer-content { margin-top: 20px; width: 100%; }
        .prazo-text { color: var(--primary-blue); font-weight: bold; text-transform: uppercase; font-size: 16px; }
        .divider { height: 3px; background: var(--primary-blue); width: 80px; margin: 15px 0; }
        .footer-bottom { display: flex; justify-content: space-between; align-items: center; }
        .contact { font-size: 16px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .total-badge { background: var(--primary-blue); color: white; padding: 10px 20px; border-radius: 20px; font-size: 18px; font-weight: bold; }

        /* Estrutura de Tabela para Impressão */
        table.print-wrapper { width: 100%; min-height: 267mm; height: 100%; border-collapse: collapse; }
        thead.print-header { display: table-header-group; }
        tfoot.print-footer { display: table-footer-group; }
        tbody.print-body { display: table-row-group; }
        tbody.print-body > tr > td { height: 100%; vertical-align: top; }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; overflow: auto; }
            .form-panel { width: 100%; box-shadow: none; }
            .preview-panel { display: none; }
        }

        /* Configurações específicas apenas para quando o PDF é gerado */
        @page {
            size: A4 portrait;
            margin: 0; 
        }

        @media print {
            body { margin: 0; padding: 0; background: white; }
            .form-panel { display: none; }
            .preview-panel { display: block; padding: 0; background: white; }
            
            .a4-sheet { 
                position: relative; 
                width: 100%; 
                margin: 0; 
                padding: 15mm; 
                box-shadow: none; 
                min-height: 297mm;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="form-panel">
        <h2>Criar Orçamento</h2>
        
        <div class="form-group">
            <label>Responsável</label>
            <input type="text" id="f_responsavel" value="RUI FERREIRA" oninput="updatePreview()">
        </div>
        <div class="form-group">
            <label>Nome da Obra/Cliente</label>
            <input type="text" id="f_obra" placeholder="Ex: OBRA/JULIANO" oninput="updatePreview()">
        </div>
        <div class="form-group">
            <label>Número do Orçamento</label>
            <input type="number" id="f_numero" oninput="updatePreview()">
        </div>
        <div class="form-group">
            <label>Data</label>
            <input type="date" id="f_data" oninput="updatePreview()">
        </div>

        <div class="dynamic-list">
            <label>Serviços / Trabalho Não Incluso</label>
            <div id="servicos-container"></div>
            <button class="btn-small" onclick="addItem('servicos')">+ Adicionar Item</button>
        </div>

        <div class="dynamic-list">
            <label>Materiais</label>
            <div id="materiais-container"></div>
            <button class="btn-small" onclick="addItem('materiais')">+ Adicionar Material</button>
        </div>

        <div class="form-group">
            <label>Adicional / Mão de Obra (R$)</label>
            <input type="number" id="f_adicional" step="0.01" oninput="updatePreview()">
        </div>

        <div class="form-group">
            <label>Observações</label>
            <textarea id="f_obs" rows="3" oninput="updatePreview()"></textarea>
        </div>

        <div class="form-group">
            <label>Prazo de Conclusão</label>
            <input type="text" id="f_prazo" placeholder="Ex: 60 DIAS" value="60 DIAS" oninput="updatePreview()">
        </div>

        <div class="form-group">
            <label>Telefone de Contato</label>
            <input type="text" id="f_telefone" value="(41) 9930-3754" oninput="updatePreview()">
        </div>

        <button onclick="imprimirPdf()">Imprimir / Salvar PDF</button>
        <button style="background: #6c757d;" onclick="novoOrcamento()">Limpar e Gerar Novo Número</button>
    </div>

    <div class="preview-panel">
        <div class="a4-sheet" id="print-area">
            <table class="print-wrapper">
                <thead class="print-header">
                    <tr>
                        <td>
                            <div class="doc-header">
                                <h3 id="p_responsavel">RUI FERREIRA</h3>
                                <h1 id="p_titulo">ORÇAMENTO #0000 - OBRA</h1>
                                <p id="p_data">Data: 00/00/0000</p>
                            </div>
                        </td>
                    </tr>
                </thead>

                <tbody class="print-body">
                    <tr>
                        <td>
                            <div id="p_servicos_section"></div>
                            <div id="p_materiais_section"></div>
                            <div id="p_obs_section"></div>
                        </td>
                    </tr>
                </tbody>

                <tfoot class="print-footer">
                    <tr>
                        <td>
                            <div class="doc-footer-content">
                                <div id="p_prazo_container">
                                    <div class="prazo-text" id="p_prazo">PRAZO DE CONCLUSÃO: 60 DIAS</div>
                                </div>
                                <div class="divider"></div>
                                <div class="footer-bottom">
                                    <div class="contact">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--primary-blue)"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
                                        <span id="p_telefone">(41) 9930-3754</span>
                                    </div>
                                    <div class="total-badge" id="p_total">TOTAL: R$ 0,00</div>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

<script>
    let dados = {
        servicos: [{ desc: '', valor: '' }],
        materiais: []
    };

    window.onload = () => {
        let numId = localStorage.getItem('orcamento_id');
        if(!numId) numId = 2502;
        document.getElementById('f_numero').value = numId;
        document.getElementById('f_data').valueAsDate = new Date();
        
        renderInputs('servicos');
        renderInputs('materiais');
        updatePreview();
    };

    function addItem(tipo) {
        dados[tipo].push({ desc: '', valor: '' });
        renderInputs(tipo);
        updatePreview();
    }

    function removeItem(tipo, index) {
        dados[tipo].splice(index, 1);
        renderInputs(tipo);
        updatePreview();
    }

    function renderInputs(tipo) {
        const container = document.getElementById(`${tipo}-container`);
        container.innerHTML = '';
        dados[tipo].forEach((item, index) => {
            container.innerHTML += `
                <div class="list-item">
                    <input type="text" placeholder="Descrição" value="${item.desc}" oninput="updateData('${tipo}', ${index}, 'desc', this.value)">
                    <input type="number" placeholder="Valor (opcional)" value="${item.valor}" oninput="updateData('${tipo}', ${index}, 'valor', this.value)">
                    <button class="btn-small btn-remove" onclick="removeItem('${tipo}', ${index})">X</button>
                </div>
            `;
        });
    }

    function updateData(tipo, index, campo, valor) {
        dados[tipo][index][campo] = valor;
        updatePreview();
    }

    function formatarMoeda(valor) {
        return Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function updatePreview() {
        document.getElementById('p_responsavel').innerText = document.getElementById('f_responsavel').value;
        
        let num = document.getElementById('f_numero').value;
        let obra = document.getElementById('f_obra').value;
        document.getElementById('p_titulo').innerText = `ORÇAMENTO #${num}${obra ? '- '+obra : ''}`;
        
        let dataInput = document.getElementById('f_data').value;
        if(dataInput) {
            let d = new Date(dataInput + 'T00:00:00');
            document.getElementById('p_data').innerText = `Data: ${d.toLocaleDateString('pt-BR')}`;
        }

        let prazo = document.getElementById('f_prazo').value;
        let prazoContainer = document.getElementById('p_prazo_container');
        if(prazo.trim() !== "") {
            prazoContainer.style.display = 'block';
            document.getElementById('p_prazo').innerText = `PRAZO DE CONCLUSÃO: ${prazo}`;
        } else {
            prazoContainer.style.display = 'none';
        }

        document.getElementById('p_telefone').innerText = document.getElementById('f_telefone').value;

        renderizarTabelaPreview('servicos', 'SERVIÇO');
        renderizarTabelaPreview('materiais', 'MATERIAIS');

        let obs = document.getElementById('f_obs').value;
        let obsSection = document.getElementById('p_obs_section');
        if(obs.trim() !== '') {
            obsSection.innerHTML = `
                <div class="section-title">OBSERVAÇÕES</div>
                <table class="doc-table"><tbody><tr><td style="width: 100%;">${obs.replace(/\n/g, '<br>')}</td></tr></tbody></table>
            `;
        } else {
            obsSection.innerHTML = '';
        }

        let totalGeral = 0;
        dados.servicos.forEach(i => totalGeral += Number(i.valor) || 0);
        dados.materiais.forEach(i => totalGeral += Number(i.valor) || 0);
        totalGeral += Number(document.getElementById('f_adicional').value) || 0;

        document.getElementById('p_total').innerText = `TOTAL: ${formatarMoeda(totalGeral)}`;
    }

    function renderizarTabelaPreview(tipo, titulo) {
        let secao = document.getElementById(`p_${tipo}_section`);
        let itens = dados[tipo].filter(i => i.desc.trim() !== ''); 
        
        if(itens.length === 0) {
            secao.innerHTML = '';
            return;
        }

        let temValor = itens.some(i => i.valor !== '' && Number(i.valor) > 0);
        let html = `<div class="section-title">${titulo}</div><table class="doc-table">`;
        
        if(temValor) {
            html += `<thead><tr><th style="width: auto;">${titulo}</th><th>VALOR</th></tr></thead><tbody>`;
            itens.forEach((item, index) => {
                let v = item.valor ? formatarMoeda(item.valor) : '-';
                html += `<tr><td>${index + 1}. ${item.desc}</td><td style="text-align: center;">${v}</td></tr>`;
            });
        } else {
            html += `<thead><tr><th style="width: 100%;">${titulo}</th></tr></thead><tbody>`;
            itens.forEach((item, index) => {
                html += `<tr><td>${index + 1}. ${item.desc}</td></tr>`;
            });
        }
        
        html += `</tbody></table>`;
        secao.innerHTML = html;
    }

    function imprimirPdf() {
        let atual = document.getElementById('f_numero').value;
        localStorage.setItem('orcamento_id', parseInt(atual) + 1);
        window.print();
    }

    function novoOrcamento() {
        if(confirm("Limpar os dados e gerar um novo número?")) {
            let atual = localStorage.getItem('orcamento_id') || 2502;
            document.getElementById('f_numero').value = atual;
            document.getElementById('f_obra').value = '';
            dados.servicos = [{ desc: '', valor: '' }];
            dados.materiais = [];
            document.getElementById('f_adicional').value = '';
            document.getElementById('f_obs').value = '';
            
            renderInputs('servicos');
            renderInputs('materiais');
            updatePreview();
        }
    }
</script>

</body>
</html>
